services:
  # -------------------------------------------------------------
  # 1. Hosted CouchDB Instance (Docker Service)
  # -------------------------------------------------------------
  - type: web
    name: couchdb-db
    runtime: image
    image:
      url: docker.io/library/couchdb:3.3
    plan: starter # A starter or standard plan is required to attach a persistent disk
    envVars:
      - key: COUCHDB_USER
        value: admin
      - key: COUCHDB_PASSWORD
        generateValue: true # Render will automatically generate a highly secure random administrative password
    disk:
      name: couchdb-data
      mountPath: /opt/couchdb/data # Ensure database data survives service restarts
      sizeGB: 10

  # -------------------------------------------------------------
  # 2. FastAPI Sentiment Analytics Dashboard (Python Web Service)
  # -------------------------------------------------------------
  - type: web
    name: fan-sentiment-dashboard
    runtime: python
    plan: free # Can be run on Render's free tier
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn dashboard.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: COUCHDB_USER
        value: admin
      - key: COUCHDB_PASSWORD
        fromService:
          type: web
          name: couchdb-db
          envVarKey: COUCHDB_PASSWORD
      - key: COUCHDB_DB_NAME
        value: reddit_afl
